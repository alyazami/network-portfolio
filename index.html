<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uplink Security</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaed;
    --muted: #6b7280;
    --accent: #00d4aa;
    --accent2: #3b82f6;
    --accent3: #ff6b35;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
    top: -200px;
    right: -100px;
    pointer-events: none;
  }
  .glow2 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
    bottom: -150px;
    left: -100px;
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 24px;
    max-width: 700px;
    width: 100%;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.2);
    background: rgba(0,212,170,0.05);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 40px;
    animation: fadeIn 0.6s ease;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  h1 {
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -.03em;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease 0.1s both;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .1em;
    margin-bottom: 56px;
    animation: fadeUp 0.7s ease 0.2s both;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    animation: fadeUp 0.7s ease 0.3s both;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    cursor: pointer;
    display: block;
    text-align: left;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .card.homelab {
    border-color: rgba(0,212,170,0.2);
    background: rgba(0,212,170,0.04);
  }
  .card.homelab:hover { border-color: rgba(0,212,170,0.4); }
  .card.testing {
    border-color: rgba(255,107,53,0.2);
    background: rgba(255,107,53,0.04);
  }
  .card.testing:hover { border-color: rgba(255,107,53,0.4); }
  .card.coming {
    border-color: rgba(59,130,246,0.2);
    background: rgba(59,130,246,0.04);
  }
  .card.coming:hover { border-color: rgba(59,130,246,0.4); }
  .card-icon {
    font-size: 22px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .arrow { color: var(--accent); font-size: 16px; }
  .arrow-orange { color: var(--accent3); font-size: 16px; }
  .arrow-blue { color: var(--accent2); font-size: 16px; }
  .card-desc {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .04em;
    line-height: 1.5;
  }
  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 100px;
    background: rgba(59,130,246,0.08);
    color: var(--accent2);
    border: 1px solid rgba(59,130,246,0.15);
  }
  .footer {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 40px;
    animation: fadeUp 0.7s ease 0.4s both;
    opacity: 0.6;
  }
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    h1 { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="glow2"></div>
<div class="container">
  <div class="badge"><div class="dot"></div>UPLINK SECURITY</div>
  <h1>Your network.<br><span>Your rules.</span></h1>
  <p class="subtitle">// secure infrastructure — bandera, tx</p>
  <div class="cards">
    <a class="card homelab" href="https://home.uplinksecurity.net">
      <div class="card-icon">⬡</div>
      <div class="card-title">HomeLab <span class="arrow">→</span></div>
      <p class="card-desc">Dashboard & services portal</p>
    </a>
    <a class="card testing" href="https://adil.uplinksecurity.net">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Testing Environments <span class="arrow-orange">→</span></div>
      <p class="card-desc">Secure cloud workspaces</p>
    </a>
    <a class="card coming" href="/infrastructure">
      <div class="card-icon">◈</div>
      <div class="card-title">Technical Portfolio <span class="arrow-blue">→</span></div>
      <p class="card-desc">Network & infrastructure documentation</p>
    </a>
  </div>
  <p class="footer">protected by cloudflare zero trust &nbsp;·&nbsp; uplinksecurity.net</p>
</div>
</body>
</html>
